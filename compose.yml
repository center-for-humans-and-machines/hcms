name: hpms-monitoring

services:
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import os; from pymongo import MongoClient; MongoClient(os.environ[''MONGODB_URI''], serverSelectionTimeoutMS=2000).admin.command(''ping'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    environment:
      MONGODB_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGODB_DATABASE: hpms_local
      MONGODB_COLLECTION: Conversations
      MONGODB_CHANGE_STREAM_MAX_AWAIT_MS: "1000"
      MONGODB_BACKFILL_BATCH_SIZE: "200"
      MONGODB_BACKFILL_MAX_RETRIES: "10"
      MONGODB_BACKFILL_RETRY_SLEEP_SECONDS: "2"
      MONGODB_RECONNECT_BACKOFF_BASE_SECONDS: "1"
      MONGODB_RECONNECT_BACKOFF_MAX_SECONDS: "30"
      MONGODB_RECONNECT_BACKOFF_JITTER_SECONDS: "0.25"
      HPMS_LOG_LEVEL: "INFO"

networks:
  shared-db:
    external: true
    name: shared-db
